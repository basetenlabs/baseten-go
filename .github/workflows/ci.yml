name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Lint
        run: |
          go mod tidy
          go fmt ./...
          cd internal/tools/apigen && go run . && cd ../../..
          git diff --exit-code

      - name: Test
        run: go test ./...
