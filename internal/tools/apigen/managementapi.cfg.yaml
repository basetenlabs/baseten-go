package: managementapi
generate:
  # Client code is generated by our custom clientgen, not oapi-codegen.
  models: true
compatibility:
  # Always prefix enum constants with their type name (e.g.
  # DeploymentStatusACTIVE) so adding a new enum elsewhere in the spec that
  # happens to share a value can't retroactively rename existing constants.
  always-prefix-enum-values: true
output-options:
  type-mapping:
    string:
      formats:
        date:
          type: string
